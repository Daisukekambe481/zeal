services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - zeal_pgdata:/var/lib/postgresql/data
    networks:
      - zeal-net

  node:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      - postgres
    networks:
      - zeal-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
    - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - node
    networks:
      - zeal-net

volumes:
  zeal_pgdata:

networks:
  zeal-net:
    driver: bridge